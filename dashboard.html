<script type="module" src="js/dashboard.js"></script>

 <!-- MUSIC WIDGET -->

<div class="fixed bottom-5 right-5 z-50">

    <button
        id="musicBtn"
        class="w-14 h-14 rounded-full bg-[#8D7AA8] text-white shadow-xl flex items-center justify-center text-2xl hover:scale-110 transition">

        🎵

    </button>

    <div
        id="musicPanel"
        class="hidden absolute bottom-16 right-0 w-80 bg-white/95 backdrop-blur-xl border border-purple-100 rounded-3xl shadow-xl p-5">

        <h3 class="text-[#705D8A] font-semibold text-2xl mb-4">
            🐈 Music Player
        </h3>

        <button
            id="toggleMusic"
            class="w-full bg-[#A18BC4] hover:bg-[#8D7AA8] text-white py-3 rounded-2xl text-xl transition mb-4">

            Play

        </button>

        <label
            for="musicSelect"
            class="block text-gray-500 mb-2">

            Pilih Lagu

        </label>

        <select
            id="musicSelect"
            class="w-full border border-purple-200 rounded-2xl p-3 mb-4 focus:outline-none">

            <option value="assets/music/Mine .mp3">
                🎀 Mine
            </option>

            <option value="assets/music/Mood .mp3">
                ☁️ Mood
            </option>

            <option value="assets/music/Sweet .mp3">
                🌷 Sweet
            </option>

        </select>


        <label
            for="volumeControl"
            class="block text-gray-500 mt-4 mb-2">

            Volume

        </label>

        <input
            type="range"
            id="volumeControl"
            min="0"
            max="100"
            value="15"
            class="w-full">

    </div>

</div>

<audio id="bgMusic" loop></audio>

<script>

const musicBtn = document.getElementById("musicBtn");
const musicPanel = document.getElementById("musicPanel");

const audio = document.getElementById("bgMusic");
const toggleBtn = document.getElementById("toggleMusic");
const musicSelect = document.getElementById("musicSelect");
const volumeControl = document.getElementById("volumeControl");

musicBtn.addEventListener("click",(e)=>{

    e.stopPropagation();
    musicPanel.classList.toggle("hidden");

});

document.addEventListener("click",()=>{

    musicPanel.classList.add("hidden");

});

musicPanel.addEventListener("click",(e)=>{

    e.stopPropagation();

});

const savedSong =
localStorage.getItem("selectedSong")
|| "assets/music/Mine.mp3";

audio.src = savedSong;

musicSelect.value = savedSong;

audio.volume =
parseFloat(
localStorage.getItem("musicVolume")
|| 0.15
);

volumeControl.value =
audio.volume * 100;

volumeControl.addEventListener("input",()=>{

    audio.volume =
    volumeControl.value / 100;

    localStorage.setItem(
        "musicVolume",
        audio.volume
    );

});

const savedTime =
localStorage.getItem("musicTime");

audio.addEventListener("loadedmetadata",()=>{

    if(savedTime){

        audio.currentTime =
        parseFloat(savedTime);

    }

});

setInterval(()=>{

    localStorage.setItem(
        "musicTime",
        audio.currentTime
    );

},1000);

if(
    localStorage.getItem("musicPlaying")
    !== "false"
){

    audio.play().catch(()=>{});

    toggleBtn.innerText="Pause";

}else{

    toggleBtn.innerText="Play";

}

toggleBtn.addEventListener("click",()=>{

    if(audio.paused){

        audio.play();

        toggleBtn.innerText="Pause";

        localStorage.setItem(
            "musicPlaying",
            "true"
        );

    }else{

        audio.pause();

        toggleBtn.innerText="Play";

        localStorage.setItem(
            "musicPlaying",
            "false"
        );

    }

});

musicSelect.addEventListener("change",()=>{

    audio.src =
    musicSelect.value;

    localStorage.setItem(
        "selectedSong",
        musicSelect.value
    );

    localStorage.setItem(
        "musicTime",
        0
    );

    audio.currentTime = 0;

    audio.play();

    toggleBtn.innerText="Pause";

    localStorage.setItem(
        "musicPlaying",
        "true"
    );

});

document.addEventListener("click",()=>{

    if(
        audio.paused &&
        localStorage.getItem("musicPlaying")
        !== "false"
    ){

        audio.play().catch(()=>{});

    }

},{once:true});

</script>
</body>
